<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" integrity="sha512-jnSuA4Ss2PkkikSOLtYs8BlYIeeIK1h99ty4YfvRPAlzr377vr3CXDb7sb7eEEBYjDtcYj+AjBH3FLv5uSJuXg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
	<link rel="stylesheet" type="text/css" href="style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
	<link rel="icon" type="image" href="img/favicon.png">
    <link rel="stylesheet" href="common.css">
	<title>My First HTML</title>

    <style>
        /* Global styles */
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            line-height: 1.6;
            padding: 20px;
        }

        /**headerTop Start**/
        .headerTop {
            color: #6d6d6d;
            background-color: #e0e1dd;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
        }

        .logo {
            margin: 5px;
        }

        .searchBar {
            display: flex;
            align-items: center;
            flex: 1;
            margin-left: 10px;
        }

        .searchBar:hover {
            border: 1px solid #3399ff;
            border-radius: 22.5px;
        }

        .searchInput {
            flex: 1;
            height: 45px;
            border: none;
            border-radius: 22.5px 0 0 22.5px;
            padding: 0 10px;
            font-size: 1.2rem;
        }

        .searchButton {
            color: #fff;
            font-size: 1.5rem;
            height: 45px;
            width: 45px;
            border-radius: 0 22.5px 22.5px 0;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1c61e7;
            cursor: pointer;
        }

        .searchButton:hover {
            background-color: #1548a1;
        }

        .searchInput:focus {
            border: none;
            outline: none;
        }

        .topHeadertext {
            display: flex;
            align-items: center;
            margin-left: 15px;
        }

        .topHeaderPhone {
            font-size: 1.5rem;
            margin-right: 5px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .logo {
                width: 150px;
            }
            .searchBar {
                width: 100%;
            }
            .searchInput {
                width: calc(100% - 50px);
            }
            .topHeadertext {
                margin-top: 10px;
                display: none;
            }
        }

        /**headerMenuBar start**/
        .headerMenuBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #333;
            color: #fff;
        }

        .menuLeft {
            display: flex;
            align-items: center;
        }

        .menu {
            display: flex;
            margin-left: 20px;
        }

        .menu a {
            margin-right: 15px;
            text-decoration: none;
            color: #fff;
            transition: color 0.3s;
        }

        .menu a:hover {
            color: #ffdd57;
        }

        .menuRight {
            display: flex;
            align-items: center;
        }

        select {
            margin-right: 15px;
            padding: 5px;
            border-radius: 3px;
            border: none;
        }

        .menuRight i {
            margin: 0 10px;
            cursor: pointer;
            color: #fff;
            transition: color 0.3s;
        }

        .menuRight i:hover {
            color: #ffdd57;
        }

        .menuRight p {
            margin-left: 10px;
            font-weight: bold;
            color: #ffdd57;
        }

        /* Cart Modal Styles */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .cart-content {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            width: 500px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .cart-content h2 {
            margin: 0 0 10px;
        }

        .cart-content ul {
            list-style: none;
            padding: 0;
        }

        .cart-content ul li {
            margin: 5px 0;
        }

        .close-cart {
            cursor: pointer;
            color: red;
            margin-top: 15px;
            font-weight: bold;
        }

        /* Product Listing Styles */
        .product-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .product-card {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin: 10px;
            padding: 15px;
            overflow: hidden;
            position: relative;
            width: 220px;
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-info {
            padding: 10px 0 0 0;
        }

        .product-title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            line-height: 1.4;
            height: 40px; /* Allows 2 lines neatly */
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .price-container {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 5px;
        }

        .price {
            font-size: 18px;
            font-weight: bold;
            color: #ff6600;
        }

        .old-price {
            font-size: 13px;
            color: #999;
            text-decoration: line-through;
        }

        .discount {
            font-size: 13px;
            color: #27ae60;
            font-weight: bold;
        }

        .rating {
            margin-top: 5px;
            display: flex;
            align-items: center;
            font-size: 12px;
            color: #999;
        }

        .stars {
            color: #f1c40f;
            margin-right: 5px;
        }

        .product-card img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            transition: transform 0.3s;
        }

        .add-to-cart {
            background-color: #1c61e7;
            position: absolute;
            bottom: 15px;
            right: 15px;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }

        .add-to-cart:hover {
            background-color: #1548a1;
        }

        /* Footer Styles */
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            width: 100%;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            .headerMenuBar {
                flex-direction: column;
                align-items: flex-start;
            }
            .menuLeft, .menuRight {
                width: 100%;
                justify-content: space-between;
            }
            .menu {
                flex-wrap: wrap;
                margin-bottom: 10px;
            }
            .menu a {
                margin: 5px 0;
            }
            .product-list {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                justify-content: center;
            }
        }

        @media (max-width: 460px) {
            .product-card {
                width: 100%;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Header Start -->
    <header>
        <div class="headerTop">
            <img src="img/logo.png" alt="Logo" class="logo">
            <div class="searchBar">
                <input type="text" id="search" name="search" placeholder="Search Your Desire" class="searchInput">
                <button class="searchButton" type="button" aria-label="Search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
            <div class="topHeadertext">
                <i class="fa-solid fa-phone-volume topHeaderPhone"></i>
                <div>
                    <b>24/7 Support</b>
                    <p>+8801721181419</p>
                </div>
            </div>
            <div class="topHeadertext">
                <i class="fa-solid fa-truck-fast topHeaderPhone"></i>
                <div>
                    <b>For Bogura</b>
                    <p>Free Shipping</p>
                </div>
            </div>
        </div>

        <div class="headerMenuBar">
            <div class="menuLeft">
                <div class="category">
                    <i class="fas fa-th categoryIcon"></i>
                    <b>All Categories</b>
                </div>
                <div class="menu">
                    <a href="#">Home</a>
                    <a href="#">Campaigns</a>
                    <a href="#">Delivery & Return</a>
                    <a href="#">Stores</a>
                </div>
            </div>

            <div class="menuRight">
                <select>
					<option>Select Location</option>
					<option>01.Dhaka</option>
					<option>02.Gazipur</option>
                    <option>64.Netrokona</option>
                </select>
                <i class="fa-solid fa-heart"></i>
                <i class="fa-solid fa-user"></i>
                <i class="fa-solid fa-cart-shopping" id="cart-icon" aria-label="Cart"></i>
                <p id="cart-total">৳0.00</p>
            </div>
        </div>
    </header>
    <!-- Header End -->
     <br>

    <!-- Carousel -->
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="img/b1.jpg" alt="Slider 1" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="img/b2.jpg" alt="Slider 2" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="img/b3.jpg" alt="Slider 3" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="img/b4.jpg" alt="Slider 4" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="img/b5.jpg" alt="Slider 5" class="d-block w-100">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="cart-modal" id="cart-modal">
        <div class="cart-content">
            <h2>Your Cart</h2>
            <ul id="cart-items"></ul>
            <p class="close-cart" onclick="closeCart()">Close</p>
        </div>
    </div>

    <!-- Product Listing Start -->
    <div class="product-list" id="product-list">
        <!-- Static Demo Product matching layout -->
        <div class="product-card">
            <img src="img/beans.jpg" alt="Premium Mixed Beans" class="product-image">
            <div class="product-info">
                <div class="product-title">Premium Quality Mixed Beans and Lentils Combo Pack</div>
                <div class="price-container">
                    <div class="price">৳333</div>
                    <div class="old-price">৳756</div>
                    <span class="discount">-56%</span>
                </div>
                <div class="rating">
                    <div class="stars">★★★★☆</div>
                    <span>(237)</span>
                </div>
            </div>
            <button class="add-to-cart" onclick="addToCart('Premium Quality Mixed Beans', 333)">
                <i class="fa-solid fa-cart-plus"></i>
            </button>
        </div>
    </div>
    <!-- Product Listing End -->

    <!-- Footer Start -->
    <footer>
        <p>© 2026 Your GhostMart. All rights reserved.</p>
    </footer>
    <!-- Footer End -->

<script>
    // Updated data to sync with localized price & structure
    const products = [
        { name: 'Premium Quality Mixed Beans', price: 333, oldPrice: 756, discount: '-56%', img: 'beans.jpg' },
        { name: 'Organic Fresh Green Groceries', price: 450, oldPrice: 600, discount: '-25%', img: 'p2.jpg' },
        { name: 'Pure Homemade Mustard Oil', price: 220, oldPrice: 250, discount: '-12%', img: 'p3.jpg' },
        { name: 'Natural Flower Honey', price: 850, oldPrice: 1200, discount: '-29%', img: 'p4.jpg' }
    ];

    const searchButton = document.querySelector('.searchButton');
    const searchInput = document.querySelector('.searchInput');
    const productList = document.getElementById('product-list');

    searchButton.addEventListener('click', () => {
        const searchQuery = searchInput.value.toLowerCase();
        filterProducts(searchQuery);
    });

    // Integrated search enter key support
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const searchQuery = searchInput.value.toLowerCase();
            filterProducts(searchQuery);
        }
    });

    function filterProducts(query) {
        productList.innerHTML = ''; 
        const filteredProducts = products.filter(product => product.name.toLowerCase().includes(query));

        if (filteredProducts.length > 0) {
            filteredProducts.forEach(product => {
                const productCard = document.createElement('div');
                productCard.classList.add('product-card');
                productCard.innerHTML = `
                    <img src="img/${product.img}" alt="${product.name}">
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="price-container">
                            <div class="price">৳${product.price}</div>
                            <div class="old-price">৳${product.oldPrice}</div>
                            <span class="discount">${product.discount}</span>
                        </div>
                        <div class="rating">
                            <div class="stars">★★★★☆</div>
                            <span>(45)</span>
                        </div>
                    </div>
                    <button class="add-to-cart" onclick="addToCart('${product.name}', ${product.price})">
                        <i class="fa-solid fa-cart-plus"></i>
                    </button>
                `;
                productList.appendChild(productCard);
            });
        } else {
            productList.innerHTML = '<p class="w-100 text-center text-muted my-4">No products found.</p>';
        }
    }

    /* Cart Logic */
    let cart = [];
    let total = 0;

    function addToCart(product, price) {
        cart.push({ product, price });
        total += price;
        updateCart();
    }

    function updateCart() {
        const cartItems = document.getElementById('cart-items');
        const cartTotal = document.getElementById('cart-total');
        cartItems.innerHTML = ''; 
        cart.forEach(item => {
            const li = document.createElement('li');
            li.textContent = item.product + " - ৳" + item.price;
            cartItems.appendChild(li);
        });
        cartTotal.textContent = "৳" + total;
        document.getElementById('cart-modal').style.display = 'flex'; 
    }

    function closeCart() {
        document.getElementById('cart-modal').style.display = 'none'; 
    }

    document.getElementById('cart-icon').addEventListener('click', updateCart);
</script>

<!-- Bootstrap JS Bundle -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js" integrity="sha512-7Pi/otdlbbCR+LnW+F7PwFcSDJOuUJB3OxtEHbg4vSMvzvJjde4Po1v4BR9Gdc9aXNUNFVUY+SK51wWT8WF0Gg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>
</html>
